name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . --group dev

      - name: Run tests with coverage
        run: python -m pytest ./tests/test_*.py --cov buku --cov-report=xml --cov-report=term -c ./tests/pytest.ini

      - name: Upload coverage report
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  sonarcloud:
    needs: pytest
    if: ${{ !cancelled() && needs.pytest.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The `secrets` context can't be used in a job-level `if:`, so check
      # it here (inside `env:`, which is allowed) and gate the rest of the
      # steps on this step's output instead.
      - name: Check if SONAR_TOKEN is configured
        id: sonar_check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: echo "configured=$([ -n "$SONAR_TOKEN" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.sonar_check.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        if: steps.sonar_check.outputs.configured == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e . --group dev

      - name: Run tests with coverage
        if: steps.sonar_check.outputs.configured == 'true'
        run: python -m pytest ./tests/test_*.py --cov buku --cov-report=xml -c ./tests/pytest.ini

      - name: SonarCloud Scan
        if: steps.sonar_check.outputs.configured == 'true'
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml
